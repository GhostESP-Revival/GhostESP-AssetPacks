name: Build and Deploy to R2

on:
  push:
    branches: [main]
    paths:
      - 'assets/**'

  workflow_dispatch:

env:
  R2_BUCKET: ghostesp-marketplace
  R2_PUBLIC_URL: https://gesp.fuckyourcdn.com

jobs:
  build-assets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install ghostbt
        run: pip install ghostbt

      - name: Build and upload assets
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
        run: |
          import json
          import subprocess
          import os
          import glob
          import shutil
          import struct
          import re

          r2_bucket = os.environ['R2_BUCKET']
          r2_url = os.environ['R2_PUBLIC_URL']
          r2_endpoint = os.environ['R2_ENDPOINT']

          IMAGE_MAGIC = b"GIMG"
          GTHEME_MAGIC = b"GAPP"
          ARCHIVE_VERSION = 1
          ENTRY_MAGIC = b"FILE"
          MAX_GTHEME_ENTRY_SIZE = 256 * 1024


          def fnv1a64(data: bytes) -> int:
              h = 0xcbf29ce484222325
              for b in data:
                  h ^= b
                  h = (h * 0x100000001b3) & 0xffffffffffffffff
              return h


          def write_gtheme(package_dir: str, out_path: str) -> None:
              files = []
              for root, dirs, names in os.walk(package_dir):
                  dirs[:] = [d for d in dirs if d != '.git' and d != '__pycache__']
                  for name in names:
                      if name.endswith('.gtheme'):
                          raise ValueError(f"nested .gtheme is not allowed: {os.path.join(root, name)}")
                      files.append(os.path.join(root, name))
              files.sort()
              with open(out_path, 'wb') as out:
                  out.write(struct.pack('<4sHHI', GTHEME_MAGIC, ARCHIVE_VERSION, 0, len(files)))
                  for fpath in files:
                      rel = os.path.relpath(fpath, package_dir).replace(os.sep, '/').encode('utf-8')
                      data = open(fpath, 'rb').read()
                      if len(data) > MAX_GTHEME_ENTRY_SIZE:
                          raise ValueError(f"archive entry too large for firmware: {fpath} ({len(data)} bytes)")
                      out.write(struct.pack(
                          '<4sHHIIQ',
                          ENTRY_MAGIC, 0, len(rel), len(data), len(data), fnv1a64(data),
                      ))
                      out.write(rel)
                      out.write(data)


          def validate_gtheme(path: str) -> None:
              with open(path, 'rb') as f:
                  header = f.read(12)
                  if len(header) != 12:
                      raise ValueError(f"invalid gtheme header: {path}")
                  magic, version, _reserved, file_count = struct.unpack('<4sHHI', header)
                  if magic != GTHEME_MAGIC or version != ARCHIVE_VERSION:
                      raise ValueError(f"unsupported gtheme archive: {path}")

                  for index in range(file_count):
                      entry = f.read(24)
                      if len(entry) != 24:
                          raise ValueError(f"truncated gtheme entry {index}: {path}")
                      magic, _method, name_len, raw_size, payload_size, _hash = struct.unpack('<4sHHIIQ', entry)
                      if magic != ENTRY_MAGIC:
                          raise ValueError(f"invalid gtheme entry {index}: {path}")
                      if raw_size > MAX_GTHEME_ENTRY_SIZE or payload_size > MAX_GTHEME_ENTRY_SIZE:
                          raise ValueError(
                              f"gtheme entry {index} too large for firmware: raw={raw_size} payload={payload_size}"
                          )
                      name = f.read(name_len).decode('utf-8')
                      if name.startswith('.git/') or name.endswith('.gtheme'):
                          raise ValueError(f"forbidden gtheme entry {index}: {name}")
                      f.seek(payload_size, os.SEEK_CUR)


          def runtime_asset_paths(manifest: dict) -> list[str]:
              paths = set()

              def add_path(value):
                  if not isinstance(value, str) or not value:
                      return
                  rel = value.replace('\\', '/')
                  parts = rel.split('/')
                  if rel.startswith('/') or any(part in ('', '.', '..') for part in parts):
                      raise ValueError(f"unsafe asset path in manifest: {value}")
                  paths.add(rel)

              for variants in manifest.get('icons', {}).values():
                  if isinstance(variants, dict):
                      for rel in variants.values():
                          add_path(rel)
                  else:
                      add_path(variants)

              for value in manifest.get('backgrounds', {}).values():
                  if isinstance(value, dict):
                      add_path(value.get('source'))
                  else:
                      add_path(value)

              for legacy_key in ('bg_tile', 'background'):
                  add_path(manifest.get(legacy_key))

              return sorted(paths)


          def package_gimg_source(source_dir: str, asset_id: str, build_root: str) -> str:
              """Pass-through: package only pre-built .gimg files referenced by manifest."""
              pkg = os.path.join(build_root, asset_id)
              if os.path.isdir(pkg):
                  shutil.rmtree(pkg)
              os.makedirs(pkg, exist_ok=True)
              manifest_path = os.path.join(pkg, 'manifest.json')
              source_manifest_path = os.path.join(source_dir, 'manifest.json')
              if not os.path.isfile(source_manifest_path):
                  raise FileNotFoundError(f"manifest.json not found in {source_dir}")
              with open(source_manifest_path) as f:
                  manifest = json.load(f)
              if 'version' not in manifest:
                  manifest['version'] = 1
              if 'format' not in manifest:
                  manifest['format'] = 'ghostesp_asset_pack'

              for rel in runtime_asset_paths(manifest):
                  src = os.path.join(source_dir, rel)
                  if not os.path.isfile(src):
                      raise FileNotFoundError(f"referenced asset not found: {rel}")
                  dst = os.path.join(pkg, rel)
                  os.makedirs(os.path.dirname(dst), exist_ok=True)
                  shutil.copy2(src, dst)

              with open(manifest_path, 'w') as f:
                  json.dump(manifest, f, indent=2, sort_keys=True)
                  f.write('\n')
              gtheme = os.path.join(build_root, f'{asset_id}.gtheme')
              write_gtheme(pkg, gtheme)
              return gtheme


          for manifest_path in glob.glob('assets/*/manifest.json'):
              with open(manifest_path) as f:
                  manifest = json.load(f)

              if manifest.get('type') != 'asset':
                  continue

              asset_id = manifest['id']
              source_repo = manifest.get('source_repo', '')
              commit_sha = manifest.get('commit_sha', 'main')
              local_source = os.path.join(os.path.dirname(manifest_path), 'source')

              # Determine source directory
              if source_repo and not source_repo.endswith('/GhostESP-AssetPacks'):
                  clone_dir = f'sources/{asset_id}'
                  ref = commit_sha if re.fullmatch(r'[a-f0-9]{6,40}', commit_sha or '') else 'main'
                  print(f"Cloning {source_repo} at {ref}...")
                  result = subprocess.run(
                      ['git', 'clone', '--depth=1', source_repo, clone_dir],
                      capture_output=True, text=True,
                  )
                  if result.returncode != 0:
                      print(f"Clone failed for {asset_id}: {result.stderr}")
                      continue
                  if ref != 'main':
                      result = subprocess.run(
                          ['git', '-C', clone_dir, 'fetch', '--depth=1', 'origin', ref],
                          capture_output=True, text=True,
                      )
                      if result.returncode != 0:
                          print(f"Fetch failed for {asset_id} at {ref}: {result.stderr}")
                          continue
                      result = subprocess.run(
                          ['git', '-C', clone_dir, 'checkout', 'FETCH_HEAD'],
                          capture_output=True, text=True,
                      )
                      if result.returncode != 0:
                          print(f"Checkout failed for {asset_id} at {ref}: {result.stderr}")
                          continue
                  source_dir = clone_dir
              elif os.path.isdir(local_source):
                  print(f"Using local source for {asset_id}")
                  source_dir = local_source
              else:
                  print(f"Skipping {asset_id}: no source found")
                  continue

              # Upload preview image if explicitly specified and present
              preview_file = manifest.get('preview', '')
              if preview_file:
                  preview_path = os.path.join(source_dir, preview_file)
                  if os.path.isfile(preview_path):
                      r2_key = f"assets/{asset_id}/{preview_file}"
                      subprocess.run([
                          'aws', 's3', 'cp', preview_path, f"s3://{r2_bucket}/{r2_key}",
                          '--endpoint-url', r2_endpoint,
                          '--content-type', 'image/png',
                      ], check=True)
                      print(f"Uploaded preview: {r2_url}/{r2_key}")
                  else:
                      print(f"Preview {preview_file} not found in {source_dir}, skipping")

              # Build .gtheme: PNG-source style vs pre-built .gimg pass-through
              build_root = f'build/{asset_id}'
              if os.path.isdir(build_root):
                  shutil.rmtree(build_root)

              source_manifest_path = os.path.join(source_dir, 'manifest.json')
              if not os.path.isfile(source_manifest_path):
                  print(f"Skipping {asset_id}: source manifest not found at {source_manifest_path}")
                  continue
              with open(source_manifest_path) as f:
                  source_manifest = json.load(f)

              has_png_sources = bool(source_manifest.get('icon_sources')) or bool(source_manifest.get('background_sources'))
              has_runtime_assets = bool(source_manifest.get('icons')) or bool(source_manifest.get('backgrounds'))

              print(f"\nBuilding asset pack: {asset_id}...")
              if has_png_sources:
                  result = subprocess.run(
                      ['gbt', 'asset', 'pack', '--archive', '--out', build_root, source_dir],
                  )
                  if result.returncode != 0:
                      print(f"Build failed for {asset_id}")
                      continue
                  gtheme_files = glob.glob(os.path.join(build_root, '*.gtheme'))
              elif has_runtime_assets:
                  # Source ships pre-converted .gimg assets referenced by manifest.
                  try:
                      package_gimg_source(source_dir, asset_id, build_root)
                  except Exception as e:
                      print(f"Packaging failed for {asset_id}: {e}")
                      continue
                  gtheme_files = [os.path.join(build_root, f'{asset_id}.gtheme')]
              else:
                  print(f"Skipping {asset_id}: source manifest has no icon_sources/background_sources or icons/backgrounds")
                  continue

              for gtheme in gtheme_files:
                  try:
                      validate_gtheme(gtheme)
                  except Exception as e:
                      print(f"Skipping invalid archive {gtheme}: {e}")
                      continue

                  filename = os.path.basename(gtheme)
                  r2_key = f"assets/{asset_id}/{filename}"

                  subprocess.run([
                      'aws', 's3', 'cp', gtheme, f"s3://{r2_bucket}/{r2_key}",
                      '--endpoint-url', r2_endpoint,
                      '--content-type', 'application/octet-stream',
                  ], check=True)

                  print(f"Uploaded: {r2_url}/{r2_key}")
        shell: python

  regenerate-catalog:
    needs: build-assets
    if: needs.build-assets.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Generate catalog.json
        run: |
          import json
          import os
          import glob
          from datetime import datetime, timezone

          r2_url = os.environ['R2_PUBLIC_URL']

          catalog = {
              'generated_at': datetime.now(timezone.utc).isoformat(),
              'assets': []
          }

          for manifest_path in sorted(glob.glob('assets/*/manifest.json')):
              with open(manifest_path) as f:
                  manifest = json.load(f)

              if manifest.get('type') != 'asset':
                  continue

              asset_id = manifest['id']
              filename = f"{asset_id}.gtheme"
              preview_file = manifest.get('preview', '')

              entry = {
                  'id': asset_id,
                  'name': manifest['name'],
                  'version': manifest.get('version', '1'),
                  'authors': manifest.get('authors', ['Unknown']),
                  'category': manifest.get('category', 'Theme'),
                  'type': manifest.get('type', 'asset'),
                  'description': manifest.get('description', ''),
                  'contents': manifest.get('contents', []),
                  'file': filename,
                  'url': f"{r2_url}/assets/{asset_id}/{filename}",
                  'preview': f"{r2_url}/assets/{asset_id}/{preview_file}" if preview_file else '',
                  'reviewed': manifest.get('reviewed', False)
              }
              catalog['assets'].append(entry)

          with open('catalog.json', 'w') as f:
              json.dump(catalog, f, indent=2)

          print(f"Generated catalog.json with {len(catalog['assets'])} assets")
        shell: python
        env:
          R2_PUBLIC_URL: ${{ env.R2_PUBLIC_URL }}

      - name: Commit catalog.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add catalog.json
          git diff --staged --quiet || git commit -m "chore: regenerate catalog.json [skip ci]"
          git pull --rebase origin main
          git push

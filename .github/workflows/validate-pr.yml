name: Validate Manifests

on:
  pull_request:
    paths:
      - 'assets/**/manifest.json'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate changed manifests
        run: |
          import json
          import sys
          import os
          import re

          required_fields = ['id', 'name', 'version', 'authors', 'category', 'type', 'description', 'license', 'source_repo', 'commit_sha']

          errors = []

          for root, dirs, files in os.walk('assets'):
              if 'manifest.json' in files and root != 'assets':
                  path = os.path.join(root, 'manifest.json')
                  try:
                      with open(path) as f:
                          manifest = json.load(f)
                  except json.JSONDecodeError as e:
                      errors.append(f"{path}: Invalid JSON - {e}")
                      continue

                  for field in required_fields:
                      if field not in manifest:
                          errors.append(f"{path}: Missing required field '{field}'")

                  if manifest.get('type') != 'asset':
                      errors.append(f"{path}: 'type' must be 'asset'")

                  if not isinstance(manifest.get('authors', []), list):
                      errors.append(f"{path}: 'authors' must be an array")

                  source_repo = manifest.get('source_repo', '')
                  if source_repo and not re.match(r'https://github\.com/.+/.+', source_repo):
                      errors.append(f"{path}: 'source_repo' must be a valid GitHub URL")

                  commit_sha = manifest.get('commit_sha', '')
                  if commit_sha and not re.match(r'^[a-f0-9]{6,40}$|^main$', commit_sha):
                      errors.append(f"{path}: 'commit_sha' must be a valid git commit hash or 'main'")

          if errors:
              print("Validation failed:")
              for error in errors:
                  print(f"  - {error}")
              sys.exit(1)
          else:
              print("All manifests are valid.")
        shell: python
